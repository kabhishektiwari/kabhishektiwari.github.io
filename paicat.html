<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAICAT Interface</title>
    <link rel="stylesheet" href="css/paicat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <img src="images/authors/myprofilecircle.png" alt="PAICAT Logo" class="logo" onerror="this.src='https://via.placeholder.com/50'">
                <h1>Paicat</h1>
            </div>
            <button id="settings-btn" title="Settings"><i class="fas fa-cog"></i></button>
        </div>

        <div class="chat-area">
            <div id="chat-output"></div>
            <div id="typing-indicator" style="display: none;">PAICAT is typing...</div>
            <div id="media-preview-container" style="display: none;">
                <img id="media-preview-img" src="" alt="Media Preview">
                <span id="media-preview-name"></span>
                <button id="remove-media-btn" title="Purge attachment"><i class="fas fa-times"></i></button>
            </div>

           <div class="input-area">
                <div class="input-wrapper-pill">
                    <label for="file-upload" id="attach-btn" title="Attach Visual/Document Data">
                        <i class="fas fa-plus"></i>
                    </label>
                    <input type="file" id="file-upload" accept="image/png, image/jpeg, image/webp, image/heic, image/heif, application/pdf" style="display: none;">

                    <input type="text" id="user-input" placeholder="Ask Paicat" autocomplete="off">

                   <!-- Hidden by default. Only revealed to the developer -->
<div id="developer-model-wrapper" style="display: none;">
    <select id="inline-model-select" class="inline-select" title="Select Reasoning Architecture">
        <option value="gemini-3.1-flash-lite" selected>3.1 Flash Lite</option>
        <option value="gemini-2.5-flash">2.5 Flash</option>
    </select>
</div>

                    <button id="submit-btn" title="Send Message"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- System Parameter Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>System Parameters</h2>
            

            <label>Creator Password Tool:</label>
            <input type="password" id="new-password-input" placeholder="Type your new custom password here">
            <button id="generate-hash-btn" type="button" style="margin-top: 8px; padding: 6px; background: #34495e; border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 0.85rem;">Generate Secure Hash</button>
            <div id="hash-output-container" style="display:none; margin-top: 8px;">
                <small style="color: #27ae60; font-weight: 600;">Copy the secure hash below and update your script.js file:</small>
                <div class="copy-container">
                    <input type="text" id="generated-hash-text" readonly>
                    <button id="copy-hash-btn" type="button" title="Copy to clipboard"><i class="far fa-copy"></i></button>
                </div>
            </div>

           <label for="max-tokens">Max Output Limit (Tokens):</label>
            <input type="number" id="max-tokens" value="6000" min="100" max="6000" placeholder="max 6000 tokens">
            <small>Absolute ceiling. PAICAT self-regulates below this limit.</small>

            <div class="modal-actions">
                <button id="clear-history-btn" class="danger-btn"><i class="fas fa-trash"></i> Purge Context</button>
                <button id="save-settings-btn" class="success-btn"><i class="fas fa-save"></i> Apply Constraints</button>
            </div>
        </div>
    </div>

    <script src="js/paicat.js"></script>
</body>
</html>
